<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Explore Rentals - PadPick</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-header-flex">
                    <a href="../index.html" class="logo"><span class="logo-icon">P</span><span class="logo-text">ad<span>Pick</span></span></a>
                    <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Toggle Sidebar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                </div>
            </div>
            
            <ul class="sidebar-menu">
                <li class="menu-item active" data-view="explore">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </li>
                <li class="menu-item" data-view="filter">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    <span>Filter</span>
                </li>
                <li class="menu-item" data-view="watchlist">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    <span>Watchlist</span>
                </li>
                <li class="menu-item" data-view="mylistings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M9 22V12h6v10"></path></svg>
                    <span>Your Listing</span>
                </li>
                <li class="menu-item" data-view="messages">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Message</span>
                </li>
                <li class="menu-item" data-view="profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Profile</span>
                </li>
            </ul>
            
            <div class="sidebar-footer" id="sidebar-profile-box">
                <!-- User Profile footer details injected here -->
            </div>
        </aside>

        <!-- MAIN AREA -->
        <div class="main-content">
            <!-- TOP NAVBAR -->
            <header class="top-nav">
                <div class="top-nav-welcome" id="top-nav-username">
                    Welcome to <span>PadPick</span>
                </div>
                
                <div class="nav-links">
                    <button id="add-listing-btn" class="btn btn-accent" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.2rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        List Your Home
                    </button>
                    <button onclick="logoutUser()" class="btn btn-secondary">Log Out</button>
                </div>
            </header>

            <div class="dashboard-body">
                <!-- 1. EXPLORE VIEW (Default) -->
                <div id="view-explore" class="dashboard-view active">
                    <!-- Filters Container -->
                    <section class="filters-container" style="margin-top: 0; margin-bottom: 3rem;">
                        <form id="filter-form" class="filters-grid">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="filter-location" class="form-label">Location</label>
                                <input type="text" id="filter-location" class="input-control" placeholder="City or area...">
                            </div>
                            
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="filter-price" class="form-label">Max Price ($/mo)</label>
                                <input type="number" id="filter-price" class="input-control" placeholder="e.g. 4000">
                            </div>
                            
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="filter-bedrooms" class="form-label">Bedrooms</label>
                                <select id="filter-bedrooms" class="input-control">
                                    <option value="">Any Bedrooms</option>
                                    <option value="1">1 Bed</option>
                                    <option value="2">2 Beds</option>
                                    <option value="3">3 Beds</option>
                                    <option value="4">4+ Beds</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-primary" style="justify-content: center; height: 48px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.2rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                Search
                            </button>
                        </form>
                    </section>

                    <!-- Listings -->
                    <main class="listings-section" style="padding: 0;">
                        <div class="section-header">
                            <h2 class="section-title">Explore Rental Homes</h2>
                        </div>
                        <div id="properties-grid" class="properties-grid">
                            <!-- Property cards loaded here -->
                        </div>
                    </main>
                </div>

                <!-- 2. WATCHLIST VIEW -->
                <div id="view-watchlist" class="dashboard-view">
                    <main class="listings-section" style="padding: 0;">
                        <div class="section-header">
                            <h2 class="section-title">Your Watchlist</h2>
                        </div>
                        <div id="watchlist-grid" class="properties-grid">
                            <!-- Bookmarked cards loaded here -->
                        </div>
                    </main>
                </div>

                <!-- 3. YOUR LISTINGS VIEW -->
                <div id="view-mylistings" class="dashboard-view">
                    <main class="listings-section" style="padding: 0;">
                        <div class="section-header">
                            <h2 class="section-title">Your Listed Properties</h2>
                        </div>
                        <div id="mylistings-grid" class="properties-grid">
                            <!-- User's own property cards loaded here -->
                        </div>
                    </main>
                </div>

                <!-- 4. MESSAGES VIEW -->
                <div id="view-messages" class="dashboard-view">
                    <div class="messages-container">
                        <!-- Left Chat list -->
                        <div class="messages-sidebar">
                            <div class="messages-sidebar-header">
                                <div style="font-weight: 700; font-size: 1.1rem; color: white;">Recent Messages</div>
                                <div class="chat-search-wrapper" style="margin-top: 0.75rem;">
                                    <input type="text" id="chat-search-input" class="input-control" placeholder="🔍 Search contacts or listings..." style="padding: 0.5rem 0.8rem; font-size: 0.82rem; height: 34px; width: 100%; border-radius: var(--radius-sm);">
                                </div>
                            </div>
                            <ul class="chats-list" id="chats-list">
                                <!-- Mock Chats list dynamically loaded -->
                            </ul>
                        </div>
                        <!-- Chat view -->
                        <div class="chat-window" id="chat-window">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- 5. PROFILE VIEW -->
                <div id="view-profile" class="dashboard-view">
                    <div class="profile-card" id="profile-card-details">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Property Modal -->
    <div id="property-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <h3 class="modal-title">List a New Rental Home</h3>
            
            <form id="property-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="prop-title" class="form-label">Name of the Home / Title</label>
                        <input type="text" id="prop-title" class="input-control" placeholder="Modern 2-Bed Luxury Penthouse" required>
                    </div>
                    <div class="form-group">
                        <label for="prop-price" class="form-label">Price per Month ($)</label>
                        <input type="number" id="prop-price" class="input-control" placeholder="2400" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="prop-desc" class="form-label">Description</label>
                    <textarea id="prop-desc" class="input-control" rows="2" placeholder="Describe features, view, terms..." required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prop-owner" class="form-label">Name of the Owner</label>
                        <input type="text" id="prop-owner" class="input-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="prop-contact" class="form-label">Contact Number (private)</label>
                        <input type="tel" id="prop-contact" class="input-control" placeholder="+1 (555) 019-2834" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prop-bedrooms" class="form-label">Bedrooms</label>
                        <input type="number" id="prop-bedrooms" class="input-control" value="1" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="prop-bathrooms" class="form-label">Bathrooms</label>
                        <input type="number" id="prop-bathrooms" class="input-control" value="1" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prop-furnished" class="form-label">Furnishing State</label>
                        <select id="prop-furnished" class="input-control" required>
                            <option value="Furnished">Fully Furnished</option>
                            <option value="Semi-Furnished">Semi-Furnished</option>
                            <option value="Non-Furnished">Non-Furnished / Unfurnished</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="prop-location" class="form-label">City / Area Location</label>
                        <input type="text" id="prop-location" class="input-control" placeholder="London, Kensington" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="prop-address" class="form-label">Address of the Home</label>
                    <input type="text" id="prop-address" class="input-control" placeholder="123 Luxury Lane, Apartment 4B" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Amenities</label>
                    <div class="amenities-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.5rem; margin-top: 0.25rem;">
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="WiFi" style="width:16px; height:16px; accent-color: var(--primary);"> WiFi
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="AC" style="width:16px; height:16px; accent-color: var(--primary);"> Air Conditioning
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Pool" style="width:16px; height:16px; accent-color: var(--primary);"> Swimming Pool
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Gym" style="width:16px; height:16px; accent-color: var(--primary);"> Fitness Gym
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Parking" style="width:16px; height:16px; accent-color: var(--primary);"> Private Parking
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Kitchen" style="width:16px; height:16px; accent-color: var(--primary);"> Modern Kitchen
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Washing Machine" style="width:16px; height:16px; accent-color: var(--primary);"> Washer/Dryer
                        </label>
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" name="amenity" value="Security" style="width:16px; height:16px; accent-color: var(--primary);"> 24/7 Security
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Home Images (Upload from files)</label>
                    <input type="file" id="prop-images-upload" class="input-control" accept="image/*" multiple style="background: rgba(8, 11, 17, 0.6); color: white; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%;">
                    
                    <!-- Hidden field to store final comma-separated list of uploaded URLs -->
                    <input type="hidden" id="prop-media-urls" value="">
                    
                    <div id="prop-media-preview-container" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem;">
                        <!-- Preview of uploaded/pre-existing listing images will be populated here -->
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Submit Listing
                </button>
            </form>
        </div>
    </div>

    <!-- Property Details Modal -->
    <div id="property-detail-modal" class="modal">
        <div class="modal-content" style="max-width: 800px; padding: 2.5rem; border-radius: var(--radius-lg);">
            <button class="modal-close" id="detail-modal-close-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div id="property-detail-body">
                <!-- Injected dynamically by JS -->
            </div>
        </div>
    </div>

    <!-- Calling Modal -->
    <div id="calling-modal" class="modal">
        <div class="modal-content" style="max-width: 360px; text-align: center; padding: 3rem 2rem; border-radius: var(--radius-lg);">
            <div class="calling-avatar-ring">
                <div class="calling-icon-glow">📞</div>
            </div>
            <h3 id="calling-modal-title" style="margin-top: 1.5rem; font-size: 1.3rem;">Calling Owner...</h3>
            <p id="calling-modal-subtitle" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">Connecting call request...</p>
            
            <button id="cancel-call-btn" class="btn" style="margin-top: 2rem; width: 100%; justify-content: center; background: #ef4444; border-color: #ef4444; color: white;">
                Cancel Call
            </button>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
